name: Bug Report
description: Report a reproducible bug
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening this issue, please search existing issues to avoid duplicates.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Start the dev server with `pnpm dev:local`
        2. Call `POST /api/v1/auth/login` with payload `{...}`
        3. Observe response...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include error messages and stack traces.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - API / Backend
        - Frontend
        - Database / Migrations
        - Authentication
        - SDK generation
        - CI/CD
        - Docker / Dev environment
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Your runtime versions.
      placeholder: |
        - OS: macOS 14 / Ubuntu 22.04 / Windows 11
        - Node: 24.x
        - pnpm: 10.28.2
        - Docker: 27.x
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, or anything else that might help.
