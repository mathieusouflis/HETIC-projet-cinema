services:
  api:
    container_name: cinema-api
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    networks:
      - cinema
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      BACKEND_PORT: ${BACKEND_PORT}
      FRONTEND_URL: ${FRONTEND_URL}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_DATABASE: ${DB_DATABASE}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SSL: ${DB_SSL}
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_SECURE: ${COOKIE_SECURE}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      TMDB_API_KEY: ${TMDB_API_KEY}
      MAILGUN_API_KEY: ${MAILGUN_API_KEY}
      MAILGUN_API_URL: ${MAILGUN_API_URL}
      MAILGUN_BASE_URL: ${MAILGUN_BASE_URL}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qS -O /dev/null http://localhost:3000/api/v1 2>&1 | grep -q 'HTTP/' || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    container_name: cinema-frontend
    build:
      context: .
      dockerfile: apps/front/Dockerfile
      args:
        VITE_BACKEND_API_URL: ${VITE_BACKEND_API_URL}
        VITE_PUBLIC_POSTHOG_KEY: ${VITE_PUBLIC_POSTHOG_KEY:-}
        VITE_PUBLIC_POSTHOG_HOST: ${VITE_PUBLIC_POSTHOG_HOST:-https://eu.i.posthog.com}
    restart: unless-stopped
    networks:
      - cinema
    ports:
      - "${FRONT_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy

networks:
  cinema:
    driver: bridge
